version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - apps/rainebank/.env.local
    restart: unless-stopped

  rainesoft:
    build:
      context: .
      dockerfile: Dockerfile.rainesoft
    ports:
      - "3001:3001"
    restart: unless-stopped
